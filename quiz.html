<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Other libraries go here -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- Font libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=home,news,videocam"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Distressed&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <!-- Link to stylesheets and code -->
    <link rel="stylesheet" href="styles/quiz.css">
    <link rel="stylesheet" href="styles/bottomNav.css">
    <script type="module" src="./src/bottomNavLoader.js"></script>
    <script type="module" src="./src/header.js"></script>
</head>

<body>
    <!-- The header component -->
    <div id="Header"></div>
    <!-- The back button -->
    <a id="exitButton" href="javascript:history.back()">
        <span class="material-symbols-outlined">
            arrow_back
        </span>
    </a>
    <!-- The quiz title and quiz information -->
    <p class="pageTitle">Loading...</p>
    <p><span id="quizLength"></span> questions</p>
    <p>Max points you can earn: <span id="maxPoints"></span> points</p>

    <!-- The quiz form with templates for different type of questions -->
    <form id="quizFormFull">
        <div id="quizForm">
            <template id="quizQuestion">
                <h3 class="questionTitle">Question</h3>
                <p class="questionType">Question Type</p>
                <p>Worth: <span class="maxReward"></span> points</p>
                <template id="multpleChoiceOption">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" required>
                        <label class="form-check-label">
                            Default radio
                        </label>
                    </div>
                </template>
                <template id="quizTextInput">
                    <textarea class="form-text" required></textarea>
                </template>
            </template>
        </div>
        <!-- The submit button -->
        <div class="submitWrapper">
            <button type="submit" class="btn btn-primary" id="submitQuizBtn">Submit Quiz</button>
        </div>
    </form>
    <!-- Bottom Navbar component -->
    <div id="bottom-nav"></div>
    <!-- Script for page -->
    <script type="module" src="./src/quiz.js"></script>

</body>

</html>
