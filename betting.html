    <body>
        <div class="matches-wrapper">
            <h1 class="section-title upcoming-title">Upcoming Match</h1>

            <!-- Country name -->
            <div class="match-card">
                <div class="team-side">
                    <span class="material-symbols-outlined flag-icon">flag</span>
                    <div class="team-name" id="team1-name"></div>
                    <div class="pool-amount">Pool: <span id="team1-pool">0</span> pts</div>
                </div>
                <div class="match-middle">
                    <div class="upcoming-vs">vs</div>
                    <div class="match-date">June 11, 26 &nbsp; 12:00 P.M.</div>
                </div>
                <div class="team-side">
                    <span class="material-symbols-outlined flag-icon">flag</span>
                    <div class="team-name" id="team2-name"></div>
                    <div class="pool-amount">Pool: <span id="team2-pool">0</span> pts</div>
                </div>
            </div>
            <div class="match-card">
                <div class="team-side">-150</div>

                <div class="match-middle">Match Odds</div>

                <div class="team-side">+225</div>
            </div>

            <!-- Bet -->
            <div class="match-middle">
                <h3>Choose a country to bet on:</h3>
                <label>
                    <div class="team-name">
                        <input type="radio" id="team1" name="bet" value="team1">
                        <span id="team1-label"></span>
                    </div>
                    <div class="team-name">
                        <input type="radio" id="team2" name="bet" value="team2">
                        <span id="team2-label"></span>
                    </div>
                </label>

                <br>

                <div class="match-middle">
                    <h3>Enter the amount of points you want to bet:</h3>
                    <input type="number" id="bet" placeholder="Enter amount" required />
                    <button id="toBet" class="btn btn-dark w-10">Bet</button>
                </div>
            </div>
        </div>
