    <div id="matchDetails" class="score-banner container-fluid d-flex flex-column align-items-center py-3">
        <!-- Live Indicator -->
        <div class="live-badge mb-2">
            <img src="./images/soccer.png" alt="Soccer Matches" class="live-soccer-match">
        </div>

        <!-- Match Content -->
        <div class="d-flex align-items-center justify-content-center w-100 gap-4">
            <!-- Team Left -->
            <div class="team text-center">
                <img src="./images/flag.png" alt="ARG Flag" class="flag-icon mb-2">
                <div class="team-name">ARG</div>
            </div>

            <!-- Score Central -->
            <div class="score-display d-flex align-items-center gap-3">
                <span class="score-num">0</span>
                <span class="vs-text">vs</span>
                <span class="score-num">0</span>
            </div>

            <!-- Team Right -->
            <div class="team text-center">
                <img src="./images/flag.png" alt="ARG Flag" class="flag-icon mb-2">
                <div class="team-name">BRA</div>
            </div>
        </div>

        <!-- Match Time -->
        <div class="match-time mt-2">
            46:38 <span class="added-time">+6</span>
        </div>
    </div>

    <!-- Dropdown Handle -->
    <div class="banner-dropdown-toggle d-flex justify-content-center align-items-center" data-bs-toggle="collapse"
        data-bs-target="#matchDetails" aria-expanded="true" aria-controls="matchDetails" role="button" tabindex="0">
        <img src="./images/arrow-down.png" alt="Toggle Menu" class="dropdown-arrow-img">
    </div>
