<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Other libraries go here -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- Font libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=home,news,videocam"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Distressed&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <!-- Link to stylesheets -->
    <link rel="stylesheet" href="styles/updateMatchInfo.css">
    <script type="module" src="./src/bottomNavLoader.js"></script>
    <script type="module" src="./src/header.js"></script>
</head>

<body>
    <!------------------------------>
    <!-- Navbar using Bootstrap -->
    <!------------------------------>
    <div id="Header"></div>
    <div>
        <form id="updateInfoForm">
            <div class="formElement">
                <label for="homePointsTextbox" id="homeCountry"></label>
                <input type="number" min="0" id="homePointsTextbox" required>
            </div>
            <div class="formElement">
                <label for="awayPointsTextbox" id="awayCountry"></label>
                <input type="number" min="0" id="awayPointsTextbox" required>
            </div>
            <div class="formElement">
                <label for="matchStatusDropdown" id="matchStatusLabel">Match Status:</label>
                <select class="form-select" name="selectStatus" id="matchStatusDropdown"
                    aria-label="Select Match Status" required>
                    <option value="upcoming">Upcoming</option>
                    <option value="live">Live</option>
                    <option value="done">Done</option>
                </select>
            </div>
            <div class="formButtons">
                <div class="formElement">
                    <label for="cancelUpdate" id="cancelUpdateLabel"></label>
                    <input class="btn btn-secondary" type="button" id="cancelUpdate" value="Cancel">
                </div>
                <div class="formElement">
                    <label for="saveUpdateInfo" id="saveButtonLabel"></label>
                    <input type="button" class="btn btn-dark" id="saveUpdateInfo" value="Save"></button>
                </div>
            </div>
        </form>
    </div>


    <div id="bottom-nav"></div>

    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->

    <!-- Link to scripts of your own -->
    <script type="module" src="./src/app.js"></script>
    <script type="module" src="./src/updateMatchInfo.js"></script>
</body>

</html>
