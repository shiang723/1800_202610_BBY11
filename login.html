<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log into Extra-Time</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="styles/login.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-white">

    <div class="login-container px-4">
        <h2 class="fw-bold mb-4">Log into Extra-Time</h2>
        
        <!-- Email Input -->
        <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" id="email" class="form-control py-2" placeholder="example@gmail.com">
        </div>

        <!-- Password Input -->
        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" id="password" class="form-control py-2" placeholder="Password">
        </div>

        <!-- Buttons & Links -->
        <button id="loginBtn" class="btn btn-dark w-100 py-2 mb-2">Log in</button>
        <div class="text-center mb-5">
            <a href="#" class="text-decoration-underline text-dark small">Forgot password?</a>
        </div>

        <button id="signUpBtn" class="btn btn-dark w-100 py-2">Sign up</button>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module" src="app.js"></script>
</body>
</html>
