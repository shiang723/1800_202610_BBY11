<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Other libraries go here -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- Font libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=home,news,videocam"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Distressed&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <!-- Link to stylesheets and scripts-->
    <link rel="stylesheet" href="styles/updateProfile.css">
    <link rel="stylesheet" href="styles/bottomNav.css">
    <script type="module" src="./src/bottomNavLoader.js"></script>
    <script type="module" src="./src/header.js"></script>
    <script type="module" src="./components/countrySelect.js"></script>
</head>

<body>
    <!-- The header component -->
    <div id="Header"></div>
    <!-- The back button -->
    <a id="exit_button" href="javascript:history.back()">
        <span class="material-symbols-outlined">
            arrow_back
        </span>
    </a>
    <!-- The profile update UI container and items -->
    <div id="profileUpdatePage">
        <p class="pageTitle">Update Profile</p>
        <form id="updateProfileForm">
            <div class="formElement">
                <p class="radioHeader">Email:</p>
                <p id="email"></p>
            </div>
            <!-- Elements where user can update their profile information -->
            <div class="formElement">
                <label for="profilePictureUploader" id="pictureLabel">Profile Picture:</label>
                <img id="profileImage" src="/images/user-square.png" alt="Profile Picture" width="50" height="50">
                <br>
                <input type="file" id="profilePictureUploader" accept="image/*" />
            </div>
            <div class="formElement">
                <label for="country-select" id="teamSelectLabel">Team You Support:</label>
                <country-select localName="teamSelect" className="form-select" aria-label="Select Team" required>
                </country-select>
            </div>
            <div class="formElement">
                <p class="radioHeader">Account Type:</p>
                <div class="radioButtonField">
                    <span class="radioButton" id="regularRadio">
                        <label for="regularChoice" id="regularLabel">Regular User
                            <input type="radio" id="regularChoice" value="regular" name="accountType" required>
                        </label>
                    </span>
                    <span class="radioButton" id="adminRadio">
                        <label for="adminChoice" id="adminLabel">Admin
                            <input type="radio" id="adminChoice" value="admin" name="accountType" required>
                        </label>
                    </span>
                </div>
            </div>
            <!-- The cancel and save buttons -->
            <div class="formButtons">
                <div class="formElement">
                    <label for="cancelUpdate" id="cancelUpdateLabel"></label>
                    <input class="btn btn-secondary" type="button" id="cancelUpdate" value="Cancel">
                </div>
                <div class="formElement">
                    <label for="saveUpdateInfo" id="saveButtonLabel"></label>
                    <input type="button" class="btn btn-dark" id="saveUpdateInfo" value="Save"></button>
                </div>
            </div>
        </form>
    </div>
    <!-- Bottom Navbar component -->
    <div id="bottom-nav"></div>

    <!-- Script for page -->
    <script type="module" src="./src/app.js"></script>
    <script type="module" src="./src/updateProfile.js"></script>
</body>

</html>
